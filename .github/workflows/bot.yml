name: OTC News Bot

on:
  schedule:
    # Cada 10 minutos (GitHub puede retrasarlo unos minutos más en horas punta)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # Permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write   # Necesario para guardar el historial de noticias enviadas

concurrency:
  group: otc-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cachear navegador de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar dependencias
        run: |
          pip install playwright requests python-dotenv
          playwright install chromium --with-deps

      - name: Ejecutar el bot (una pasada)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ vars.CHAT_ID }}
          TOPIC_ID:  ${{ vars.TOPIC_ID }}
          RUN_ONCE:  "1"
        run: python otc_telegram_bot.py

      - name: Guardar historial de noticias enviadas
        run: |
          git config user.name  "otc-bot"
          git config user.email "bot@users.noreply.github.com"
          git add noticias_enviadas.json || true
          git diff --cached --quiet || git commit -m "Actualizar historial de noticias"
          git push || true
